<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>오프라인 — 설비펌프 산정 시스템</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Pretendard',system-ui,sans-serif;background:#eff6ff;color:#0f172a;
  display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.container{text-align:center;max-width:400px}
.icon{font-size:64px;margin-bottom:20px}
h1{font-size:22px;font-weight:800;color:#1d4ed8;margin-bottom:8px}
p{font-size:14px;color:#64748b;line-height:1.7;margin-bottom:24px}
.btn{display:inline-flex;align-items:center;gap:8px;padding:12px 24px;
  background:#1d4ed8;color:#fff;border:none;border-radius:10px;
  font-size:14px;font-family:inherit;font-weight:700;cursor:pointer;
  text-decoration:none;transition:all .2s}
.btn:hover{background:#2563eb;transform:translateY(-1px)}
.info{margin-top:24px;padding:14px 18px;background:#fff;border-radius:10px;
  border:1px solid #bfdbfe;font-size:12px;color:#475569;line-height:1.8;text-align:left}
.info strong{color:#1d4ed8}
</style>
</head>
<body>
<div class="container">
  <div class="icon">📵</div>
  <h1>오프라인 상태입니다</h1>
  <p>인터넷 연결이 끊겼습니다.<br>앱을 홈 화면에 설치하면 오프라인에서도 사용 가능합니다.</p>
  <a href="./index.html" class="btn" onclick="location.reload();return false">🔄 다시 시도</a>
  <div class="info">
    <strong>💡 오프라인 사용 방법</strong><br>
    한 번이라도 접속하면 앱이 기기에 캐시됩니다.<br>
    이후엔 인터넷 없이도 펌프 산정이 가능합니다.<br><br>
    <strong>📲 홈 화면 설치</strong><br>
    설치 시 더 빠르고 안정적인 오프라인 사용이 가능합니다.
  </div>
</div>
</body>
</html>
